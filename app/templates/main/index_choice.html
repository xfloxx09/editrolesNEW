{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <a href="{{ url_for('main.coaching_dashboard') }}" class="btn btn-lg btn-block p-4" style="background-color: #e20074; color: white; border-radius: 20px; text-decoration: none; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <i class="fas fa-chalkboard-teacher fa-3x mb-2"></i>
                <h4>Coachings</h4>
                <p>Alle Einzelcoachings anzeigen</p>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{{ url_for('main.workshop_dashboard') }}" class="btn btn-lg btn-block p-4" style="background-color: #6c757d; color: white; border-radius: 20px; text-decoration: none; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <i class="fas fa-users fa-3x mb-2"></i>
                <h4>Workshops</h4>
                <p>Alle Workshops anzeigen</p>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{{ url_for('main.assigned_coachings') }}" class="btn btn-lg btn-block p-4" style="background-color: #28a745; color: white; border-radius: 20px; text-decoration: none; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <i class="fas fa-tasks fa-3x mb-2"></i>
                <h4>Zugewiesene Coachings</h4>
                <p>Meine Aufgaben (To-Do)</p>
            </a>
        </div>
    </div>
</div>
