{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <!-- If you want to keep a link to add coaching, keep this, otherwise remove -->
        <div class="col-md-6 offset-md-3">
            <a href="{{ url_for('main.add_coaching') }}" class="btn btn-lg btn-block p-5" style="background-color: #e20074; color: white; border-radius: 20px; text-decoration: none; height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <i class="fas fa-chalkboard-teacher fa-4x mb-3"></i>
                <h3>Neues Coaching (Einzel)</h3>
                <p>Ein Coaching für ein Teammitglied erfassen</p>
            </a>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-md-6 offset-md-3">
            <a href="{{ url_for('main.add_workshop') }}" class="btn btn-lg btn-block p-5" style="background-color: #6c757d; color: white; border-radius: 20px; text-decoration: none; height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <i class="fas fa-users fa-4x mb-3"></i>
                <h3>Neuer Workshop (Gruppe)</h3>
                <p>Einen Workshop für mehrere Teilnehmer erfassen</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
